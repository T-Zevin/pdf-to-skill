<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="360" viewBox="0 0 1100 360" role="img" aria-labelledby="title desc">
  <title id="title">pdf-to-skill workflow</title>
  <desc id="desc">Scientific paper PDF is extracted, analyzed as a research engine, transferred to a new direction, and compiled into a Codex skill.</desc>
  <defs>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1100" height="360" fill="#F8FAFC"/>
  <rect x="32" y="28" width="1036" height="76" rx="14" fill="url(#header)"/>
  <text x="64" y="76" fill="#FFFFFF" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="700">pdf-to-skill</text>
  <text x="252" y="76" fill="#CCFBF1" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">compile a paper's research logic into a reusable Codex skill</text>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" filter="url(#shadow)">
    <g transform="translate(52,148)">
      <rect width="190" height="132" rx="12" fill="#FFFFFF" stroke="#CBD5E1"/>
      <text x="24" y="38" fill="#0F172A" font-size="20" font-weight="700">1. Input</text>
      <text x="24" y="70" fill="#475569" font-size="15">paper PDF</text>
      <text x="24" y="96" fill="#475569" font-size="15">target direction</text>
    </g>
    <g transform="translate(296,148)">
      <rect width="190" height="132" rx="12" fill="#FFFFFF" stroke="#CBD5E1"/>
      <text x="24" y="38" fill="#0F172A" font-size="20" font-weight="700">2. Extract</text>
      <text x="24" y="70" fill="#475569" font-size="15">text + metadata</text>
      <text x="24" y="96" fill="#475569" font-size="15">IMRaD sections</text>
    </g>
    <g transform="translate(540,148)">
      <rect width="190" height="132" rx="12" fill="#FFFFFF" stroke="#CBD5E1"/>
      <text x="24" y="38" fill="#0F172A" font-size="20" font-weight="700">3. Analyze</text>
      <text x="24" y="70" fill="#475569" font-size="15">research engine</text>
      <text x="24" y="96" fill="#475569" font-size="15">evidence chain</text>
    </g>
    <g transform="translate(784,148)">
      <rect width="190" height="132" rx="12" fill="#FFFFFF" stroke="#CBD5E1"/>
      <text x="24" y="38" fill="#0F172A" font-size="20" font-weight="700">4. Compile</text>
      <text x="24" y="70" fill="#475569" font-size="15">generated skill</text>
      <text x="24" y="96" fill="#475569" font-size="15">markmap + checks</text>
    </g>
  </g>

  <g fill="none" stroke="#64748B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M252 214H282"/>
    <path d="M276 206l10 8-10 8"/>
    <path d="M496 214H526"/>
    <path d="M520 206l10 8-10 8"/>
    <path d="M740 214H770"/>
    <path d="M764 206l10 8-10 8"/>
  </g>
  <text x="54" y="326" fill="#64748B" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14">Output is not a paper summary. It is a reusable research-design skill for adapting the paper's logic to a new domain.</text>
</svg>
